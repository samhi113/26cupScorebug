<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorebug</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="final">
        <h2 class="head" id="head">FIFA WORLD CUP 2026 - FINALS</h2>

        <div class="main">
            <div class="team">
                <img src="./img/espFlag.svg" alt="Spain Flag" class="flag left" id="flagLeft">
                <h3 class="teamAbbr" id="abbrLeft">ESP</h3>
                <div class="score left" id="scoreLeft">
                    <div class="scorebar" style="background-color: #a11; color: #eb1;"></div>
                    <div class="scorebar" style="background-color: #a11; color: #eb1;" id="scoreLeft">1</div>
                    <div class="scorebar" style="background-color: #a11; color: #eb1;"></div>
                </div>
            </div>

            <div class="time">
                <h3>97:59</h3>
            </div>

            <div class="team">
                <div class="score right" id="scoreRight">
                    <div class="scorebar" style="background-color: #7ad; color: #123;"></div>
                    <div class="scorebar" style="background-color: #7ad; color: #123;">0</div>
                    <div class="scorebar" style="background-color: #7ad; color: #123;"></div>
                </div>
                <h3 class="teamAbbr" id="abbrRight">ARG</h3>
                <img src="./img/argFlag.svg" alt="Argentina Flag" class="flag right" id="flagRight">
            </div>
        </div>

        <div class="main main2" style="background-color: transparent;"></div>

        <h3 class="footer">+8'</h3>
    </nav>

        <h4>Control Panel</h4>
        <form>
            <div class="LRSec matchType">
                <label for="gameType">Match Type</label>
                <select name="gameType" id="gameType">
                    <option value="" selected disabled hidden>Match Type</option>
                    <option value="groupA">Group A</option>
                    <option value="groupB">Group B</option>
                    <option value="groupC">Group C</option>
                    <option value="groupD">Group D</option>
                    <option value="groupE">Group E</option>
                    <option value="groupF">Group F</option>
                    <option value="groupG">Group G</option>
                    <option value="groupH">Group H</option>
                    <option value="groupI">Group I</option>
                    <option value="groupJ">Group J</option>
                    <option value="groupK">Group K</option>
                    <option value="groupL">Group L</option>
                    <option value="r32">Round of 32</option>
                    <option value="r16">Round of 16</option>
                    <option value="r8">Round of 8</option>
                    <option value="semis">Semifinals</option>
                    <option value="3rd">Third Place</option>
                    <option value="finals">Finals</option>

            </div>

                        </optgroup>
                        <optgroup label="Group C">
                            <option value="BRA">BRA - Brazil</option>

                        <optgroup label="Group D">

                            <option value="ALG">ALG - Algeria</option>
                            <option value="JOR">JOR - Jordan</option>
                        </optgroup>
                        <optgroup label="Group K">
                            <option value="COL">COL - Colombia</option>
                            <option value="POR">POR - Portugal</option>
                            <option value="COD">COD - Congo DR</option>
                            <option value="UZB">UZB - Uzbekistan</option>
                        </optgroup>
                        <optgroup label="Group L">
                            <option value="ENG">ENG - England</option>
                            <option value="CRO">CRO - Croatia</option>
                            <option value="GHA">GHA - Ghana</option>
                            <option value="PAN">PAN - Panama</option>
                        </optgroup>
                    </select>
                    <select name="homeJer" id="homeJer" class="jerseySel">
                        <option value="home" selected>First Kit</option>

                    </select>
                </div>

                        <optgroup label="Group K">
                            <option value="COL">COL - Colombia</option>
                            <option value="POR">POR - Portugal</option>
                            <option value="COD">COD - Congo DR</option>
                            <option value="UZB">UZB - Uzbekistan</option>

                        <optgroup label="Group L">

</body>
</html>
